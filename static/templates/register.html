{% extends "base.html" %}

{% block title %}Register - CyberShield AI{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h1><i class="fas fa-user-plus"></i> Register</h1>
        <p>Create your cybersecurity dashboard account.</p>

        <form method="POST" class="auth-form" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <label for="name">Full Name</label>
            <input id="name" name="name" type="text" required placeholder="Your name">

            <label for="email">Gmail / Email</label>
            <input id="email" name="email" type="email" required placeholder="you@gmail.com">

            <label for="phone">Phone Number</label>
            <input id="phone" name="phone" type="tel" required placeholder="+923001234567">

            <label for="profile_image">Profile Picture (Optional)</label>
            <input id="profile_image" name="profile_image" type="file" accept="image/png,image/jpeg,image/webp">

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required placeholder="Minimum 8 characters">

            <button type="submit" class="btn-primary"><i class="fas fa-user-check"></i> Create Account</button>
        </form>

        <p class="auth-help">Already registered? <a href="/login">Login</a></p>
    </div>
</div>
{% endblock %}
