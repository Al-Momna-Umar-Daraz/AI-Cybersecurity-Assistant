{% extends "base.html" %}

{% block title %}Forgot Password - CyberShield AI{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h1><i class="fas fa-key"></i> Forgot Password</h1>
        <p>Enter your Gmail or email, get a 6-digit code, then set a new password.</p>

        <div class="auth-form">
            <label for="forgotEmailInput">Gmail / Email</label>
            <input id="forgotEmailInput" type="email" autocomplete="email" placeholder="you@gmail.com">

            <button type="button" class="btn-secondary" onclick="requestForgotPasswordCode()">
                <i class="fas fa-paper-plane"></i> Send Reset Code
            </button>

            <div id="forgotPasswordNotice" class="auth-inline-notice hidden"></div>

            <label for="forgotOtpCode">Verification Code</label>
            <input id="forgotOtpCode" type="text" maxlength="6" placeholder="Enter 6-digit code">

            <label for="forgotNewPassword">New Password</label>
            <div class="password-field-wrap">
                <input id="forgotNewPassword" type="password" placeholder="At least 8 chars, A-z + 0-9">
                <button type="button" class="password-toggle-btn" data-toggle-password="forgotNewPassword" aria-label="Show password">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <label for="forgotConfirmPassword">Confirm Password</label>
            <div class="password-field-wrap">
                <input id="forgotConfirmPassword" type="password" placeholder="Retype new password">
                <button type="button" class="password-toggle-btn" data-toggle-password="forgotConfirmPassword" aria-label="Show password">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <button type="button" class="btn-primary" onclick="submitForgotPasswordChange()">
                <i class="fas fa-lock"></i> Change Password
            </button>
        </div>

        <p class="auth-help">Remembered it? <a href="/login">Back to login</a></p>
    </div>
</div>
{% endblock %}
