{% extends "base.html" %}

{% block content %}
<div class="analyzer-container">
    <h1><i class="fas fa-terminal"></i> Linux Command Practice Lab</h1>
    <p class="muted-text">Practice Linux command safety before using commands on real servers.</p>

    <div class="input-section">
        <input id="linuxCommandInput" type="text" placeholder="Enter Linux command (e.g., ls -la /var/log)">
        <button onclick="runLinuxLab()" class="btn-analyze"><i class="fas fa-play"></i> Evaluate Command</button>
    </div>

    <div id="linuxResultSection" class="result-section hidden">
        <div class="threat-score">
            <div class="score-circle" id="linuxScoreCircle"><span id="linuxScoreValue">0</span>%</div>
            <div>
                <div id="linuxStatus">UNKNOWN</div>
                <small id="linuxMessage" class="muted-text"></small>
            </div>
        </div>
        <div class="threat-details">
            <h3>Feedback</h3>
            <ul id="linuxFeedbackList"></ul>
        </div>
    </div>
</div>
{% endblock %}
