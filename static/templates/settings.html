{% extends "base.html" %}

{% block content %}
<div class="settings-container">
    <h1><i class="fas fa-cog"></i> Settings</h1>

    <div class="toolbar-row">
        <div class="toolbar-item toolbar-grow">
            <label for="settingsSearch">Search Settings</label>
            <input id="settingsSearch" type="text" placeholder="Example: dark mode, notifications, auto refresh" oninput="filterSettings()">
        </div>
    </div>

    <div class="settings-section setting-item" data-name="appearance dark mode">
        <h3>Appearance</h3>
        <label class="toggle">
            <span>Dark Mode</span>
            <input type="checkbox" id="darkMode" {% if settings_data.dark_mode %}checked{% endif %}>
            <span class="slider"></span>
        </label>
    </div>

    <div class="settings-section setting-item" data-name="notifications threat alerts scan complete">
        <h3>Notifications</h3>
        <label class="toggle">
            <span>High Threat Alerts</span>
            <input type="checkbox" id="threatAlerts" {% if settings_data.threat_alerts %}checked{% endif %}>
            <span class="slider"></span>
        </label>
        <label class="toggle">
            <span>Scan Complete Notification</span>
            <input type="checkbox" id="scanComplete" {% if settings_data.scan_complete %}checked{% endif %}>
            <span class="slider"></span>
        </label>
        <label class="toggle">
            <span>Auto Refresh Dashboard</span>
            <input type="checkbox" id="autoRefresh" {% if settings_data.auto_refresh %}checked{% endif %}>
            <span class="slider"></span>
        </label>
    </div>

    <div class="settings-section setting-item" data-name="password reset security otp code email phone">
        <h3>Password & Security</h3>
        <p class="muted-text">Change password using a 6-digit verification code sent to your email or phone.</p>

        <div class="input-section mt-1">
            <select id="passwordCodeChannel">
                <option value="email">Send code to Email ({{ current_user_email or 'not-set' }})</option>
                <option value="phone">Send code to Phone ({{ current_user_phone or 'not-set' }})</option>
            </select>
            <button type="button" class="btn-secondary" onclick="requestPasswordCode()">
                <i class="fas fa-paper-plane"></i> Send Code
            </button>
        </div>

        <div class="input-section mt-1">
            <input id="passwordOtpCode" type="text" maxlength="6" placeholder="Enter 6-digit code (example: 123456)">
            <input id="newPasswordInput" type="password" placeholder="New password (At least 8 chars, A-z + 0-9)">
            <input id="confirmPasswordInput" type="password" placeholder="Confirm new password">
            <button type="button" class="btn-primary" onclick="changePasswordWithCode()">
                <i class="fas fa-lock"></i> Change Password
            </button>
        </div>
    </div>

    <div class="settings-section setting-item" data-name="data reset cache">
        <h3>Data</h3>
        <div class="settings-actions">
            <button class="btn-primary" type="button" onclick="saveSettings()">
                <i class="fas fa-save"></i> Save Settings
            </button>
            <button class="btn-danger" type="button" onclick="resetData()">
                <i class="fas fa-trash"></i> Reset All Reports
            </button>
            <button class="btn-secondary" type="button" onclick="clearCache()">Clear Browser Cache</button>
        </div>
    </div>
</div>
{% endblock %}
